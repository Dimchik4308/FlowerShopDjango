{% extends 'main/base.html' %}

{% block main %}
<style>
    .email-confirm-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh; /* Щоб картка була по центру екрану, враховуючи хедер */
        padding: 20px;
    }

    .email-confirm-card {
        background-color: #ffffff;
        border-radius: 20px; /* Такі ж закруглені кути, як на твоїх фото букетів */
        padding: 50px 40px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* Легка тінь, як у твоїх бокових панелей */
        border: 1px solid #f0f0f0;
    }

    .email-confirm-icon {
        font-size: 64px;
        margin-bottom: 20px;
        display: inline-block;
        background-color: #f7f9f8;
        width: 100px;
        height: 100px;
        line-height: 100px;
        border-radius: 50%;
    }

    .email-confirm-title {
        color: #2b4c3b; /* Твій фірмовий темно-зелений */
        font-size: 28px;
        margin-bottom: 15px;
        font-weight: normal;
        /* Якщо в тебе підключений шрифт для заголовків (як Playfair Display), він тут підхопиться */
    }

    .email-confirm-text {
        color: #555555;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn-return-home {
        display: inline-block;
        background-color: #2b4c3b; /* Фірмовий зелений */
        color: #ffffff;
        text-decoration: none;
        padding: 14px 30px;
        border-radius: 30px; /* Овальна кнопка, як на фільтрах */
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .btn-return-home:hover {
        background-color: #1e3629; /* Трохи темніший при наведенні */
        transform: translateY(-2px);
    }
</style>

<div class="email-confirm-container">
    <div class="email-confirm-card">
        <div class="email-confirm-icon">💌</div>

        <h1 class="email-confirm-title">Перевірте вашу пошту</h1>

        <p class="email-confirm-text">
            Ми надіслали лист із посиланням для підтвердження на вашу електронну адресу.
            Будь ласка, перейдіть за ним, щоб завершити реєстрацію.
        </p>

        <a href="{% url 'main_home' %}" class="btn-return-home">Повернутися до магазину</a>
    </div>
</div>
{% endblock %}
