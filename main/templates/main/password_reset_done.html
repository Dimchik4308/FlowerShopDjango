{% extends 'main/base.html' %}
{% block title %}Лист відправлено - Petal & Bloom{% endblock %}

{% block main %}
<style>
  .auth-wrapper { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; background: var(--cream); }
  .auth-card { background: #ffffff; border-radius: 24px; border: 1px solid rgba(200,224,208,.55); box-shadow: 0 12px 40px rgba(45,90,61,.08); padding: 56px 40px; max-width: 440px; width: 100%; text-align: center; animation: fadeUp .6s ease both; }
  .auth-icon { font-size: 48px; margin-bottom: 16px; }
  .auth-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 300; color: #1e2d25; margin-bottom: 16px; line-height: 1.2; }
  .auth-title em { font-style: italic; color: #4a7c5f; }
  .auth-desc { font-size: 15px; color: #4a5e52; line-height: 1.7; margin-bottom: 32px; }
  .btn-auth { display: inline-block; padding: 14px 32px; border-radius: 999px; background: #2d5a3d; color: #fff; text-decoration: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: .3s; }
  .btn-auth:hover { background: #4a7c5f; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,90,61,.2); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-icon">✉️</div>
    <h2 class="auth-title">Перевірте <em>пошту</em></h2>
    <p class="auth-desc">Ми щойно відправили інструкції з відновлення пароля на вашу електронну адресу. Якщо листа немає, перевірте папку "Спам".</p>
    <a href="/" class="btn-auth">На головну</a>
  </div>
</div>
{% endblock %}
